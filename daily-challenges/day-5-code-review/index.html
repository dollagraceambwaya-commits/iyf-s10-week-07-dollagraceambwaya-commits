<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Weather Dashboard</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="weather-app">
            <h1>Weather Dashboard</h1>

            <form id="search-form">
                <input
                    type="text"
                    id="city-input"
                    placeholder="Enter city name..."
                    required
                />
                <button type="submit">Search</button>
            </form>

            <div id="loading" class="hidden">Loading...</div>

            <div id="error" class="hidden error"></div>

            <div id="weather-display" class="hidden">
                <div class="weather-main">
                    <h2 id="city-name"></h2>
                    <img id="weather-icon" src="" alt="Weather icon" />
                    <p id="temperature"></p>
                    <p id="description"></p>
                </div>

                <div class="weather-details">
                    <div class="detail">
                        <span>Feels Like</span>
                        <span id="feels-like"></span>
                    </div>
                    <div class="detail">
                        <span>Humidity</span>
                        <span id="humidity"></span>
                    </div>
                    <div class="detail">
                        <span>Wind</span>
                        <span id="wind"></span>
                    </div>
                    <div class="detail">
                        <span>Pressure</span>
                        <span id="pressure"></span>
                    </div>
                </div>
            </div>

            <div id="recent-searches">
                <h3>Recent Searches</h3>
                <ul id="search-history"></ul>
            </div>
        </div>

        <div id="forecast" class="hidden">
            <h2>5-Day Forecast</h2>
            <div id="forecast-cards" class="forecast-cards">
                <!-- Forecast cards will be dynamically added here -->
            </div>
        </div>
        <button id="unit-toggle">Switch to °F</button>
        <button id="geo-btn">Get My Location Weather</button>

        <script src="app.js"></script>
    </body>
</html>
